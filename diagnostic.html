<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcReady Diagnostic</title>
    <base href="/arcready/">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .pass { background: #d4edda; color: #155724; }
        .fail { background: #f8d7da; color: #721c24; }
        .loading { background: #fff3cd; color: #856404; }
        #console { background: #333; color: #0f0; padding: 10px; font-family: monospace; height: 200px; overflow: auto; }
    </style>
</head>
<body>
    <h1>ArcReady Diagnostic Page</h1>

    <div class="test" id="base-test">Testing base href...</div>
    <div class="test" id="css-test">Testing CSS loading...</div>
    <div class="test" id="js-test">Testing JavaScript loading...</div>

    <h2>Console Output:</h2>
    <div id="console"></div>

    <h2>Test Results:</h2>
    <div id="results"></div>

    <script>
        // Capture console.log
        const consoleDiv = document.getElementById('console');
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        function logToDiv(type, args) {
            const message = Array.from(args).join(' ');
            const line = `<div><strong>${type}:</strong> ${message}</div>`;
            consoleDiv.innerHTML += line;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        console.log = function(...args) {
            logToDiv('LOG', args);
            originalLog.apply(console, args);
        };

        console.error = function(...args) {
            logToDiv('ERROR', args);
            originalError.apply(console, args);
        };

        console.warn = function(...args) {
            logToDiv('WARN', args);
            originalWarn.apply(console, args);
        };

        // Test base href
        console.log('Starting diagnostic...');
        const baseTest = document.getElementById('base-test');
        const baseTag = document.querySelector('base');
        if (baseTag && baseTag.href === '/arcready/') {
            baseTest.textContent = '✓ Base href is correctly set to /arcready/';
            baseTest.className = 'test pass';
        } else {
            baseTest.textContent = '✗ Base href issue: ' + (baseTag ? baseTag.href : 'No base tag');
            baseTest.className = 'test fail';
        }

        // Test CSS loading
        const cssTest = document.getElementById('css-test');
        const stylesheets = Array.from(document.styleSheets);
        const cssFiles = ['main.css', 'ai.css'];

        let cssLoaded = 0;
        stylesheets.forEach(sheet => {
            try {
                if (sheet.href && cssFiles.some(css => sheet.href.includes(css))) {
                    cssLoaded++;
                    console.log('✓ CSS loaded:', sheet.href.split('/').pop());
                }
            } catch(e) {
                console.warn('Cannot access stylesheet:', e.message);
            }
        });

        if (cssLoaded >= 2) {
            cssTest.textContent = `✓ ${cssLoaded}/2 CSS files loaded`;
            cssTest.className = 'test pass';
        } else {
            cssTest.textContent = `✗ Only ${cssLoaded}/2 CSS files loaded`;
            cssTest.className = 'test fail';
        }

        // Test JavaScript loading
        const jsTest = document.getElementById('js-test');
        const jsFiles = [
            'standards.js', 'svg-circuits.js', 'ai-assistant.js',
            'test-engine.js', 'reference.js', 'progress.js',
            'app.js', 'lab.js'
        ];

        // Track loaded scripts
        let scriptsLoaded = 0;
        const loadedScripts = new Set();

        // Monkey-patch document.createElement to track script tags
        const originalCreateElement = document.createElement;
        document.createElement = function(tagName, options) {
            const element = originalCreateElement.call(this, tagName, options);
            if (tagName.toLowerCase() === 'script' && element.src) {
                element.addEventListener('load', () => {
                    const filename = element.src.split('/').pop();
                    loadedScripts.add(filename);
                    console.log('✓ Script loaded:', filename);

                    if (loadedScripts.size === jsFiles.length) {
                        jsTest.textContent = `✓ All ${jsFiles.length} scripts loaded`;
                        jsTest.className = 'test pass';
                    }
                });

                element.addEventListener('error', (e) => {
                    const filename = element.src.split('/').pop();
                    console.error('✗ Script failed to load:', filename, e);
                    jsTest.textContent = `✗ Script failed: ${filename}`;
                    jsTest.className = 'test fail';
                });
            }
            return element;
        };

        // Load scripts dynamically
        console.log('Loading scripts...');
        jsFiles.forEach(filename => {
            const script = document.createElement('script');
            script.src = `js/${filename}`;
            script.async = false;
            document.head.appendChild(script);
        });

        // Set timeout for scripts
        setTimeout(() => {
            if (loadedScripts.size < jsFiles.length) {
                const missing = jsFiles.filter(f => !loadedScripts.has(f));
                console.warn(`Only ${loadedScripts.size}/${jsFiles.length} scripts loaded`);
                console.warn('Missing:', missing);
                jsTest.textContent = `✗ Only ${loadedScripts.size}/${jsFiles.length} scripts loaded`;
                jsTest.className = 'test fail';
            }
        }, 5000);

        // Test global variables
        setTimeout(() => {
            console.log('Testing global variables...');
            const resultsDiv = document.getElementById('results');

            const tests = [
                { name: 'ArcReady', check: () => typeof window.ArcReady !== 'undefined' },
                { name: 'SVGCircuits', check: () => typeof window.SVGCircuits !== 'undefined' },
                { name: 'TestEngine', check: () => typeof window.TestEngine !== 'undefined' },
                { name: 'AIAssistant', check: () => typeof window.AIAssistant !== 'undefined' },
                { name: 'StandardsMode', check: () => typeof window.StandardsMode !== 'undefined' },
            ];

            tests.forEach(test => {
                const result = test.check();
                const div = document.createElement('div');
                div.className = result ? 'test pass' : 'test fail';
                div.textContent = result ? `✓ ${test.name} is defined` : `✗ ${test.name} is NOT defined`;
                resultsDiv.appendChild(div);
                console.log(`${result ? '✓' : '✗'} ${test.name}:`, result);
            });
        }, 3000);

        console.log('Diagnostic complete');
    </script>
</body>
</html>
