
<!DOCTYPE html>
<html>
<head>
    <title>ArcReady JavaScript Test</title>
    <base href="/arcready/">
</head>
<body>
    <h1>JavaScript Test</h1>
    <div id="result">Testing...</div>

    <script>
        console.log("JavaScript is working!");
        document.getElementById("result").textContent = "JavaScript loaded successfully!";

        // Test event listeners
        document.body.addEventListener("click", function() {
            document.getElementById("result").textContent = "Click detected! JavaScript is responsive!";
        });

        // Test if ArcReady scripts would load
        function testScriptLoad(src) {
            return new Promise((resolve) => {
                const script = document.createElement("script");
                script.src = src;
                script.onload = () => resolve(true);
                script.onerror = () => resolve(false);
                document.head.appendChild(script);
            });
        }

        // Test loading lab.js
        testScriptLoad("js/lab.js").then(success => {
            console.log("lab.js load test:", success ? "SUCCESS" : "FAILED");
        });
    </script>
</body>
</html>
